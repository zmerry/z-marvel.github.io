<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>道德批判思维激发助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="control-panel">
      <div class="brand-block">
        <p class="eyebrow">Github Pages Agent Console</p>
        <h1>道德批判思维激发助手</h1>
        <p class="subtitle">公开托管前端，通过 Cloudflare Worker 代理访问 Coze 流式接口。浏览器不再直接持有 Bearer Token。</p>
      </div>

      <section class="panel-section">
        <div class="section-heading">
          <h2>系统提示词</h2>
          <button id="resetPromptButton" class="ghost-button" type="button">恢复默认</button>
        </div>
        <label class="field">
          <span>Agent Prompt</span>
          <textarea id="systemPromptInput" rows="18"></textarea>
        </label>
      </section>

      <section class="panel-section">
        <div class="section-heading">
          <h2>预设情境</h2>
          <button id="applyScenarioButton" class="ghost-button" type="button">填入对话框</button>
        </div>
        <label class="field">
          <span>情境选择</span>
          <select id="scenarioSelect"></select>
        </label>
        <div id="scenarioCard" class="scenario-card">
          <h3 id="scenarioTitle"></h3>
          <p id="scenarioSummary" class="scenario-summary"></p>
          <p id="scenarioPrompt" class="scenario-prompt"></p>
        </div>
      </section>
    </aside>

    <main class="chat-panel">
      <section class="chat-header">
        <div>
          <p class="eyebrow">Interactive Session</p>
          <h2>提问与追问</h2>
        </div>
        <div class="header-actions">
          <button id="clearChatButton" class="ghost-button" type="button">清空对话</button>
        </div>
      </section>

      <section id="statusBar" class="status-bar idle">等待输入</section>

      <section id="chatLog" class="chat-log" aria-live="polite"></section>

      <form id="chatForm" class="composer">
        <label class="field grow">
          <span>学生情境 / 追问目标</span>
          <textarea id="messageInput" rows="5" placeholder="例如：学生说“直接抄 AI 答案只要老师没发现就没关系”，请按四阶段流程引导。"></textarea>
        </label>
        <div class="composer-actions">
          <button id="sendButton" class="primary-button" type="submit">开始对话</button>
        </div>
      </form>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="message">
      <div class="message-meta"></div>
      <div class="message-body"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
